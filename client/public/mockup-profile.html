<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头像昵称功能 Mockup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1117; color: #e0d8c8; font-family: 'PingFang SC', 'Helvetica Neue', sans-serif; display: flex; gap: 0; height: 100vh; overflow: hidden; }

  /* ===== 左侧：Settings 页面 ===== */
  .settings-page {
    flex: 1;
    padding: 32px;
    border-right: 1px solid #2a2e3a;
    overflow-y: auto;
  }
  .settings-page h2 { font-size: 18px; color: #c9a84c; margin-bottom: 24px; letter-spacing: 2px; }

  /* 个人资料卡片 */
  .profile-card {
    background: #1a1f2e;
    border: 1px solid #2a2e3a;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .profile-card h3 { font-size: 13px; color: #888; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; }

  .avatar-row {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
  }
  .avatar-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c9a84c, #8b6914);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .avatar-circle:hover { opacity: 0.85; }
  .avatar-circle img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }
  .avatar-overlay {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .avatar-circle:hover .avatar-overlay { opacity: 1; }
  .avatar-hint { font-size: 13px; color: #666; line-height: 1.8; }
  .avatar-hint strong { color: #c9a84c; display: block; margin-bottom: 4px; }

  .field-label { font-size: 12px; color: #888; margin-bottom: 8px; }
  .field-row { display: flex; gap: 10px; align-items: center; }
  .field-input {
    flex: 1;
    background: #0f1117;
    border: 1px solid #2a2e3a;
    border-radius: 6px;
    padding: 10px 14px;
    color: #e0d8c8;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: #c9a84c; }
  .btn-save {
    background: #c9a84c;
    color: #0f1117;
    border: none;
    border-radius: 6px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-save:hover { background: #b8963e; }

  /* 邀请码区域 */
  .invite-card {
    background: #1a1f2e;
    border: 1px solid #2a2e3a;
    border-radius: 12px;
    padding: 24px;
  }
  .invite-card h3 { font-size: 13px; color: #888; letter-spacing: 2px; margin-bottom: 16px; text-transform: uppercase; }
  .invite-code-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #2a2e3a;
    font-size: 13px;
  }
  .code { font-family: monospace; color: #c9a84c; letter-spacing: 1px; }
  .code-status { color: #555; font-size: 12px; }
  .btn-gen {
    margin-top: 16px;
    background: transparent;
    border: 1px solid #c9a84c;
    color: #c9a84c;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
  }

  /* ===== 右侧：聊天界面预览 ===== */
  .chat-preview {
    width: 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #2a2e3a;
  }
  .chat-header {
    padding: 14px 16px;
    border-bottom: 1px solid #2a2e3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .chat-header-left { display: flex; align-items: center; gap: 10px; }
  .logo { color: #c9a84c; font-size: 16px; font-weight: bold; letter-spacing: 2px; }
  .room-name { color: #666; font-size: 13px; }
  .header-user { display: flex; align-items: center; gap: 8px; }
  .header-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #c9a84c, #8b6914); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #fff; flex-shrink: 0; }
  .header-username { font-size: 13px; color: #aaa; }
  .header-btn { font-size: 12px; color: #666; background: none; border: none; cursor: pointer; padding: 4px 8px; }

  .chat-body { flex: 1; display: flex; overflow: hidden; }

  /* 在线用户列表 */
  .user-list {
    width: 130px;
    border-right: 1px solid #2a2e3a;
    padding: 12px 8px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .user-list-title { font-size: 11px; color: #555; letter-spacing: 1px; margin-bottom: 12px; padding: 0 4px; }
  .user-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }
  .user-item:hover { background: #1a1f2e; }
  .user-item.active { background: #1a1f2e; }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    flex-shrink: 0;
  }
  .user-name { font-size: 12px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-name .me { color: #555; font-size: 11px; }

  /* 消息区域 */
  .messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 10px; }
  .msg.self { flex-direction: row-reverse; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #fff; flex-shrink: 0; }
  .msg-body { max-width: 200px; }
  .msg-meta { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
  .msg.self .msg-meta { flex-direction: row-reverse; }
  .msg-name { font-size: 12px; color: #888; }
  .msg-time { font-size: 11px; color: #444; }
  .msg-bubble {
    background: #1a1f2e;
    border: 1px solid #2a2e3a;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    color: #ddd;
  }
  .msg.self .msg-bubble { background: #2a3142; border-color: #3a4162; }

  .tag { display: inline-block; font-size: 10px; color: #555; background: #1a1f2e; border: 1px solid #2a2e3a; border-radius: 4px; padding: 1px 5px; margin-left: 4px; }
  .section-label { text-align: center; font-size: 11px; color: #444; padding: 4px 0; }
</style>
</head>
<body>

<!-- Settings 页面 -->
<div class="settings-page">
  <h2>设　置</h2>

  <div class="profile-card">
    <h3>个人资料</h3>
    <div class="avatar-row">
      <div class="avatar-circle">
        戈
        <div class="avatar-overlay">更换</div>
      </div>
      <div class="avatar-hint">
        <strong>点击头像上传图片</strong>
        支持 JPG、PNG，建议正方形图片
      </div>
    </div>
    <div class="field-label">昵称</div>
    <div class="field-row">
      <input class="field-input" type="text" value="戈德斯文" placeholder="设置昵称（可选）" />
      <button class="btn-save">保存</button>
    </div>
  </div>

  <div class="invite-card">
    <h3>邀请码</h3>
    <div class="invite-code-item">
      <span class="code">JIANGHU01</span>
      <span class="code-status">未使用</span>
    </div>
    <div class="invite-code-item">
      <span class="code">WULIN2024</span>
      <span class="code-status">已使用</span>
    </div>
    <button class="btn-gen">生成邀请码</button>
  </div>
</div>

<!-- 聊天界面预览 -->
<div class="chat-preview">
  <div class="chat-header">
    <div class="chat-header-left">
      <span class="logo">江湖</span>
      <span class="room-name"># 公共大厅</span>
    </div>
    <div class="header-user">
      <div class="header-avatar">戈</div>
      <span class="header-username">戈德斯文</span>
      <button class="header-btn">退出</button>
    </div>
  </div>

  <div class="chat-body">
    <!-- 在线用户 -->
    <div class="user-list">
      <div class="user-list-title">在线 · 3</div>
      <div class="user-item active">
        <div class="user-avatar" style="background:linear-gradient(135deg,#c9a84c,#8b6914)">戈</div>
        <div class="user-name">戈德斯文<br><span class="me">(我)</span></div>
      </div>
      <div class="user-item">
        <div class="user-avatar" style="background:linear-gradient(135deg,#4c7ac9,#1a4a8b)">剑</div>
        <div class="user-name">剑客无名</div>
      </div>
      <div class="user-item">
        <div class="user-avatar" style="background:linear-gradient(135deg,#4cc97a,#1a8b4a)">花</div>
        <div class="user-name">花间一壶酒</div>
      </div>
    </div>

    <!-- 消息列表 -->
    <div class="messages">
      <div class="msg">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#4c7ac9,#1a4a8b)">剑</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-name">剑客无名</span>
            <span class="msg-time">23:41</span>
          </div>
          <div class="msg-bubble">江湖路远，保重</div>
        </div>
      </div>

      <div class="msg">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#4cc97a,#1a8b4a)">花</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-name">花间一壶酒</span>
            <span class="msg-time">23:43</span>
          </div>
          <div class="msg-bubble">哈哈，好久不见！</div>
        </div>
      </div>

      <div class="msg self">
        <div class="msg-avatar" style="background:linear-gradient(135deg,#c9a84c,#8b6914)">戈</div>
        <div class="msg-body">
          <div class="msg-meta">
            <span class="msg-name">戈德斯文</span>
            <span class="msg-time">23:59</span>
          </div>
          <div class="msg-bubble">Bearer Token 认证改造完成！</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
